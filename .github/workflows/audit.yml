name: audit

# The audit IS the test suite (docs/CONTRIBUTING.md): conformance + the
# anti-sidestep attack suite + the engine self-tests. Gate every push and PR on
# it, on the floor (3.8) and a current Python, since the code is kept 3.8+.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.8 is EOL: pin it to ubuntu-22.04, where setup-python provisions it
        # reliably (24.04/ubuntu-latest may not). The current Python runs on
        # ubuntu-latest. This verifies the 3.8+ floor the code claims.
        include:
          - { python-version: "3.8", os: ubuntu-22.04 }
          - { python-version: "3.12", os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # stdlib only -- nothing to install.
      - name: Conformance + anti-sidestep
        run: python tools/audit.py --sidestep
      - name: Engine & toolkit self-tests
        run: python tools/audit.py --engine
